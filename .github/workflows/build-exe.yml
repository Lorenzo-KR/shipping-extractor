name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pdfplumber openpyxl pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name "ShippingExtractor" shipping_extractor_gui.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: ShippingExtractor-Windows
          path: dist/ShippingExtractor.exe
